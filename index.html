<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Math Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* Comprehensive KaTeX styling for dark mode */
        .katex {
            color: white !important;
            font-family: KaTeX_Main, "Times New Roman", serif;
        }

        /* KaTeX elements styling */
        .katex .mathit {
            font-family: KaTeX_Math, "Times New Roman", serif;
        }

        .katex .mathnormal {
            font-family: KaTeX_Main, "Times New Roman", serif;
        }

        .katex .mathrm {
            font-family: KaTeX_Main, "Times New Roman", serif;
        }

        .katex .mathbf {
            font-family: KaTeX_Main, "Times New Roman", serif;
            font-weight: bold;
        }

        .katex .mathbb {
            font-family: KaTeX_AMS, "Times New Roman", serif;
        }

        .katex .mathcal {
            font-family: KaTeX_Caligraphic, "Times New Roman", serif;
        }

        .katex .mathfrak {
            font-family: KaTeX_Fraktur, "Times New Roman", serif;
        }

        .katex .mathscr {
            font-family: KaTeX_Script, "Times New Roman", serif;
        }

        .katex .mathsf {
            font-family: KaTeX_SansSerif, sans-serif;
        }

        .katex .mathtt {
            font-family: KaTeX_Typewriter, monospace;
        }

        /* Ensure proper text rendering */
        .katex .text {
            font-family: KaTeX_Main, "Times New Roman", serif;
        }

        /* Handle inline and display math differently */
        .katex .mord {
            color: white !important;
        }

        .katex .mop {
            color: white !important;
        }

        .katex .mbin {
            color: white !important;
        }

        .katex .mrel {
            color: white !important;
        }

        .katex .mopen {
            color: white !important;
        }

        .katex .mclose {
            color: white !important;
        }

        .katex .mpunct {
            color: white !important;
        }

        .katex .minner {
            color: white !important;
        }

        /* Error styling */
        .katex-error {
            color: #ff6b6b !important;
            border: 1px solid #ff6b6b;
            padding: 2px 4px;
            border-radius: 3px;
            background-color: rgba(255, 107, 107, 0.1);
        }

        /* Loading state styling */
        .katex-loading {
            color: #a0a0a0 !important;
            font-style: italic;
        }

        /* Fallback styling */
        .katex-fallback {
            color: #ffa500 !important;
            font-family: "Courier New", monospace;
            background-color: rgba(255, 165, 0, 0.1);
            padding: 2px 4px;
            border-radius: 3px;
        }
    </style>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-slate-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
